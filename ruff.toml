target-version = "py310"
line-length = 88
exclude = [
    ".git",
    "__pycache__",
    "build",
    "pdk",
    "venv",
    "test/designs/*.py",
    "examples",
    "sandbox",
    "test",
]

[lint]
select = ["E", "F", "W", "PT"]
ignore = [
    "E1",
    "W1",
    "E2",
    "W2",
    "E3",
    "W3",
    "E5",
    "W5",
    "E731",
    "E721",
    "PT001",
]

[lint.per-file-ignores]
"*/__init__.py" = ["F401"]
